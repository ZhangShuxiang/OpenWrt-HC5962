name: Build HC5962
#------------------#
on:
  workflow_dispatch:
#------------------#
env:
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_TAG: v25.12.5
  CONF_FILE: hc5962/hc5962a.config
  DIY_P1_SH: hc5962/diy-part1.sh
  DIY_P2_SH: hc5962/diy-part2.sh
#------------------#
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
#-----------------------------------------------#
    - name: Initialization environment
    
      run: |
        sudo -E apt -qqy update
        sudo -E apt -qqy install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget
#-----------------------------------------------#
    - name: Checkout main
      uses: actions/checkout@v5
      with:
        path: main

    - name: Checkout openwrt
      uses: actions/checkout@v5
      with:
        repository: openwrt/openwrt
        ref: v25.12.5
        path: openwrt

    - name: Checkout rtp2httpd
      uses: actions/checkout@v5
      with:
        repository: stackia/rtp2httpd
        path: rtp2httpd
#-----------------------------------------------#
    - name: Load custom feeds
      run: cp -r rtp2httpd/openwrt-support/* openwrt/package/
#-----------------------------------------------#
    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a
#-----------------------------------------------#
    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a
#-----------------------------------------------#
    - name: Load custom configuration
      run: |
        [ -e $CONF_FILE ] && cp $CONF_FILE openwrt/.config
        HASH=$(curl -s "https://downloads.openwrt.org/releases/25.12.5/targets/mediatek/filogic/kmods/" | sed -n 's/.*href="[^"]*-\([a-f0-9]\{32\}\)\/".*/\1/p' | head -1)
        echo $HASH> openwrt/.vermagic
        cd openwrt && chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH && $GITHUB_WORKSPACE/$DIY_P2_SH
#-----------------------------------------------#
    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
#-----------------------------------------------#
    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "DEVICE_NAME=_HiWiFi_HC5962" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
#-----------------------------------------------#
    - name: Organize files
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
#-----------------------------------------------#
    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
#-----------------------------------------------#
    - name: Generate release tag
      run: touch release.txt
#-----------------------------------------------#
    - name: Upload firmware to release
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ env.FILE_DATE }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*
#-----------------------------------------------#
