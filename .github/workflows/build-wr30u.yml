name: Build WR30U
#------------------#
on:
  workflow_dispatch:
#------------------#
env:
  REPO_TAG: 25.12.5
  CONF_FILE1: main/wr30u/wr30u.config
  CONF_FILE2: main/wr30u/99-custom
#------------------#
jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
#-----------------------------------------------#
    - name: Initialization environment
      run: |
        sudo -E apt -qqy update
        sudo -E apt -qqy install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget
#-----------------------------------------------#
    - name: Checkout main
      uses: actions/checkout@v5
      with:
        path: main

    - name: Checkout openwrt
      uses: actions/checkout@v5
      with:
        repository: openwrt/openwrt
        ref: v${{ env.REPO_TAG }}
        path: openwrt

    - name: Checkout rtp2httpd
      uses: actions/checkout@v5
      with:
        repository: stackia/rtp2httpd
        path: rtp2httpd
#-----------------------------------------------#
    - name: Load custom feeds
      run: |
       cp -r rtp2httpd/openwrt-support/* openwrt/package/
       rm -rf rtp2httpd
#-----------------------------------------------#
    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a
#-----------------------------------------------#
    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a
#-----------------------------------------------#
    - name: Load custom configuration
      run: |
        if [ -e ${{ env.CONF_FILE1 }} ]; then
          cp ${{ env.CONF_FILE1 }} openwrt/.config
        fi

        if [ -e ${{ env.CONF_FILE2 }} ]; then
          mkdir -p openwrt/files/etc/uci-defaults
          cp ${{ env.CONF_FILE2 }} openwrt/files/etc/uci-defaults/
        fi

        HASH=$(curl -s "https://downloads.openwrt.org/releases/${{ env.REPO_TAG }}/targets/mediatek/filogic/openwrt-${{ env.REPO_TAG }}-mediatek-filogic.manifest" | grep "^kernel - " | sed -n 's/.*~\([a-f0-9]\{32\}\)-r.*/\1/p')
        if [ -n "$HASH" ]; then
          sed -i "s/grep.*vermagic/echo $HASH > \$(LINUX_DIR)\/.vermagic/g" include/kernel-defaults.mk 
        fi
#-----------------------------------------------#
    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
#-----------------------------------------------#
    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        rm -rf bin/targets/mediatek/filogic/packages
#-----------------------------------------------#
    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_firmware_WR30U_${{ github.sha }}
        path: openwrt/bin/targets/mediatek/filogic
#-----------------------------------------------#
    - name: Upload firmware to release
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: OpenWrt_firmware_WR30U_${{ github.sha }}
        files: openwrt/bin/targets/mediatek/filogic/*
#-----------------------------------------------#
