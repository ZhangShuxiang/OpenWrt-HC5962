name: Build X64
#------------------#
on:
  workflow_dispatch:
#------------------#
jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      DEBIAN_FRONTEND: noninteractive
      REPO_TAG: 25.12.5
      CONF_FILE1: main/x64/x64a.config
      CONF_FILE2: main/x64/99-custom
    steps:
#-----------------------------------------------#
    - name: Initialization environment
      run: |
        sudo -E apt -qqy update
        sudo -E apt -qqy install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget
#-----------------------------------------------#
    - name: Checkout main
      uses: actions/checkout@v5
      with:
        path: main

    - name: Checkout openwrt
      uses: actions/checkout@v5
      with:
        repository: openwrt/openwrt
        ref: v${{ env.REPO_TAG }}
        path: openwrt
#-----------------------------------------------#
    - name: Update Install feeds
      run: |
        cd openwrt
        echo 'src-git rtp2httpd https://github.com/stackia/rtp2httpd.git' >>feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a
#-----------------------------------------------#
    - name: Load custom configuration
      run: |
        if [ -e ${{ env.CONF_FILE1 }} ]; then
          cp ${{ env.CONF_FILE1 }} openwrt/.config
        fi

        if [ -e ${{ env.CONF_FILE2 }} ]; then
          mkdir -p openwrt/files/etc/uci-defaults
          cp ${{ env.CONF_FILE2 }} openwrt/files/etc/uci-defaults/
        fi

        HASH=$(curl -s "https://downloads.openwrt.org/releases/${{ env.REPO_TAG }}/targets/x86/64/openwrt-${{ env.REPO_TAG }}-x86-64.manifest" | grep "^kernel - " | sed -n 's/.*~\([a-f0-9]\{32\}\)-r.*/\1/p')
        if [ -n "$HASH" ]; then
          sed -i "s/grep.*vermagic/echo $HASH > \$(LINUX_DIR)\/.vermagic/g" openwrt/include/kernel-defaults.mk 
        fi
#-----------------------------------------------#
    - name: Download package
      run: |
        cd openwrt
        make defconfig
        make download -j8
#-----------------------------------------------#
    - name: Make the firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 || make -j1 V=s
        rm -rf bin/targets/x86/64/packages
#-----------------------------------------------#
    - name: Upload firmware directory
      uses: actions/upload-artifact@v6
      with:
        name: OpenWrt_${{ env.REPO_TAG }}_X64_${{ github.sha }}
        path: openwrt/bin/targets/x86/64
#-----------------------------------------------#
    - name: Upload firmware to release
      uses: softprops/action-gh-release@v3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: OpenWrt_${{ env.REPO_TAG }}_X64_${{ github.sha }}
        files: openwrt/bin/targets/x86/64/*
#-----------------------------------------------#
